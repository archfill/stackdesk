services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docker-manager-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/docker-manager.db
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      # Docker socket をマウントして、ホストの Docker を操作可能にする
      - /var/run/docker.sock:/var/run/docker.sock
      # アプリケーションデータ（SQLite）
      - dm-data:/data
    networks:
      - docker-manager-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docker-manager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docker-manager-network
    restart: unless-stopped

networks:
  docker-manager-network:
    driver: bridge

volumes:
  dm-data:
