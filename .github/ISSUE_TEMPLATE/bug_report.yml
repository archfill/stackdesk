name: Bug report
description: Report a defect or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal sequence to reproduce the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What did you expect, and what actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: StackDesk version / commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web UI
        - HTTP API
        - MCP
        - CLI / scripts
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker version, etc.
      placeholder: |
        - OS:
        - Docker:
        - Browser:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant container logs, network errors, screenshots. Redact secrets first.
      render: shell
    validations:
      required: false
