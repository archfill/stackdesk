name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this address? Why does it matter?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you solve it? Sketch UI / API / MCP shape if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one wins.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Web UI
        - HTTP API
        - MCP
        - Backend internals
        - Docs / DX
        - Other
    validations:
      required: true
